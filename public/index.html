<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-Time Collaboration Tool</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="panel">
          <p class="eyebrow">Room</p>
          <h1>Realtime Editor</h1>
          <p id="room-link" class="muted">Preparing room...</p>
          <button id="new-room-button" class="secondary-button" type="button">
            Create new room
          </button>
        </div>

        <div class="panel">
          <p class="eyebrow">You</p>
          <div id="identity-card"></div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <p class="eyebrow">Users Online</p>
            <span id="online-count" class="badge">0</span>
          </div>
          <ul id="users-list" class="users-list"></ul>
        </div>
      </aside>

      <main class="editor-area">
        <div class="editor-header">
          <div>
            <p class="eyebrow">Phase 3 + 4</p>
            <h2>CRDT-powered shared editor</h2>
          </div>
          <p class="muted">
            Yjs merges concurrent edits, CodeMirror handles syntax highlighting, and the room state survives refreshes.
          </p>
        </div>

        <div class="toolbar">
          <label class="toolbar-control">
            <span>Language</span>
            <select id="language-select">
              <option value="javascript">JavaScript</option>
              <option value="python">Python</option>
              <option value="cpp">C++</option>
            </select>
          </label>

          <button id="theme-toggle" class="secondary-button" type="button">
            Toggle theme
          </button>

          <p id="status-pill" class="status-pill">Connecting…</p>
        </div>

        <div id="editor" class="editor-surface" aria-label="Collaborative code editor"></div>
      </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/client.js"></script>
  </body>
</html>
